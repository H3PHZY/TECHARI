<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mentee Dashboard - Techari</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/mentee-dashboard.js"></script>
</head>
<body>
  <div class="container">
    <h2>Welcome, Mentee!</h2>
    <div id="profileInfo"></div>

    <!-- Mentor Discovery & Matching -->
    <h3>Find a Mentor</h3>
    <div id="mentorSearch"></div>
    <div id="mentorList"></div>

    <!-- Session Request Workflow -->
    <h3>Your Session Requests</h3>
    <button id="newSessionBtn" class="mentee-btn">Request New Session</button>
    <div id="newSessionFormContainer" style="display:none;"></div>
    <div id="menteeRequests"></div>

    <!-- Progress Tracking -->
    <h3>Your Progress</h3>
    <div id="progress"></div>

    <p id="message"></p>
    <button onclick="logout()">Logout</button>
  </div>
</body>
</html>
