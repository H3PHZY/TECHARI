<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Techari | Mentee Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="css/mentee-dashboard.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/mentee-dashboard.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 via-pink-50 to-purple-100 min-h-screen">
  <header class="bg-white border-b border-purple-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-lg flex items-center justify-center">
          <i class="lucide lucide-heart text-white w-5 h-5"></i>
        </div>
        <h1 class="text-xl font-bold gradient-title">Techari</h1>
      </div>
      <div class="flex items-center gap-4">
        <button class="relative p-2 rounded-full hover:bg-purple-50">
          <i class="lucide lucide-bell text-gray-600"></i>
          <span class="absolute -top-1 -right-1 w-3 h-3 bg-pink-500 rounded-full"></span>
        </button>
        <button class="p-2 rounded-full hover:bg-purple-50">
          <i class="lucide lucide-settings text-gray-600"></i>
        </button>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full flex items-center justify-center">
            <i class="lucide lucide-user text-white w-5 h-5"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-gray-900" id="menteeName">Mentee Name</p>
            <p class="text-xs text-gray-500">Mentee</p>
          </div>
        </div>
      </div>
    </div>
  </header>

  <nav class="bg-white border-b border-purple-100">
    <div class="max-w-7xl mx-auto px-4 flex gap-6 py-2">
      <button class="tab-link active flex items-center gap-2 text-purple-600 font-medium border-b-2 border-purple-500 py-2">
        <i class="lucide lucide-trending-up w-4 h-4"></i> Overview
      </button>
      <button class="tab-link flex items-center gap-2 text-gray-500 hover:text-gray-700 border-b-2 border-transparent hover:border-gray-300 py-2">
        <i class="lucide lucide-search w-4 h-4"></i> Find Mentors
      </button>
      <button class="tab-link flex items-center gap-2 text-gray-500 hover:text-gray-700 border-b-2 border-transparent hover:border-gray-300 py-2">
        <i class="lucide lucide-calendar w-4 h-4"></i> My Sessions
      </button>
      <button class="tab-link flex items-center gap-2 text-gray-500 hover:text-gray-700 border-b-2 border-transparent hover:border-gray-300 py-2">
        <i class="lucide lucide-award w-4 h-4"></i> Progress
      </button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="mb-8">
      <h2 class="text-2xl font-bold text-gray-900 mb-1" id="welcomeText">Welcome back, Mentee!</h2>
      <p class="text-gray-600" id="menteeTrack">Continue your journey in your chosen track</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-purple-100">
        <p class="text-gray-600 text-sm">Completed Sessions</p>
        <p class="text-2xl font-bold text-purple-600" id="completedSessions">0</p>
        <p class="text-xs text-gray-500 mt-1">This month</p>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-purple-100">
        <p class="text-gray-600 text-sm">Upcoming Sessions</p>
        <p class="text-2xl font-bold text-purple-600" id="upcomingSessions">0</p>
        <p class="text-xs text-gray-500 mt-1">This week</p>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-purple-100">
        <p class="text-gray-600 text-sm">Progress</p>
        <p class="text-2xl font-bold text-pink-600" id="progressPercent">0%</p>
        <p class="text-xs text-gray-500 mt-1">Overall completion</p>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-purple-100">
        <p class="text-gray-600 text-sm">Mentors</p>
        <p class="text-2xl font-bold text-purple-600" id="activeMentors">0</p>
        <p class="text-xs text-gray-500 mt-1">Active connections</p>
      </div>
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-sm border border-purple-100">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">Recent Activity</h3>
      <ul class="space-y-3" id="recentActivity">
        <!-- Recent activity will be dynamically loaded here -->
      </ul>
    </div>
  </main>
</body>
</html>
