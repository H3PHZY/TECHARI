<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Techari Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h2>Session Dashboard</h2>
    <div id="session-requests">
      <h3>Pending Session Requests</h3>
      <ul id="request-list"></ul>
    </div>
    <div id="accepted-sessions">
      <h3>Accepted Sessions</h3>
      <ul id="accepted-list"></ul>
    </div>
    <div id="rejected-sessions">
      <h3>Rejected Sessions</h3>
      <ul id="rejected-list"></ul>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
