<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Profile - Techari</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #8B5CF6, #A855F7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .profile-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(255, 107, 157, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .background-circles {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border-radius: 50%;
            z-index: 0;
        }

        .background-circles::before {
            content: '';
            position: absolute;
            top: 100px;
            right: 50px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .profile-content {
            position: relative;
            z-index: 1;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }



        .profile-name {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .profile-location {
            color: #888;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .profile-title {
            font-size: 18px;
            color: #555;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .profile-company {
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            display: block;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }

        .show-more-btn {
            background: linear-gradient(135deg, #8B5CF6, #A855F7);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .show-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
        }

        .rating {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 15px;
        }

        .star {
            color: #ffc107;
            font-size: 16px;
        }

        .rating-text {
            color: #666;
            font-size: 14px;
            margin-left: 8px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .skill-tag {
            background: #f0f0f0;
            color: #666;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
        }

        .bio {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
            font-size: 14px;
        }

        
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="background-circles"></div>
        
        <div class="profile-content">


            <img src="assets/May-Wambua.jpg" alt="Profile" class="profile-image">
            
            <h1 class="profile-name">May Wambua</h1>
            <p class="profile-location">Nairobi, Kenya</p>
            
            <div class="rating">
                <span class="star">⭐</span>
                <span class="rating-text">4.9 • Available: Evenings</span>
            </div>
            
            <p class="profile-title">Cloud Engineer</p>
            <p class="profile-company">Cloud Engineer at Microsoft Africa</p>
            
            <div class="bio">
                Helping African businesses scale with the cloud.
            </div>

            <div class="skills">
                <span class="skill-tag">Azure</span>
                <span class="skill-tag">CI/CD</span>
                <span class="skill-tag">Terraform</span>
                <span class="skill-tag">Containers</span>
            </div>
            
            <div class="stats-container">
                <div class="stat">
                    <span class="stat-number">233</span>
                    <span class="stat-label">Mentees</span>
                </div>
                <div class="stat">
                    <span class="stat-number">4.9</span>
                    <span class="stat-label">Rating</span>
                </div>
                <div class="stat">
                    <span class="stat-number">2.5k</span>
                    <span class="stat-label">Sessions</span>
                </div>
            </div>
            
            <button class="show-more-btn">Request Session</button>
        </div>
    </div>
</body>
</html>
