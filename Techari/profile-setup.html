<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Setup - Techari</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h2>Complete Your Profile</h2>
    <form id="profileForm">
      <label>Role:</label>
      <select id="role" required>
        <option value="">Select role</option>
        <option value="mentor">Mentor</option>
        <option value="mentee">Mentee</option>
      </select><br>

      <label>Name:</label>
      <input type="text" id="name" required><br>

      <label>Email:</label>
      <input type="email" id="email" readonly><br>

      <label>Photo:</label>
      <input type="url" id="photo" placeholder="Link to your photo"><br>

      <label>Interests:</label>
      <input type="text" id="interests" placeholder="e.g. Web Development, AI"><br>

      <label>Bio:</label>
      <textarea id="bio" rows="3"></textarea><br>

      <label>Availability:</label>
      <input type="text" id="availability" placeholder="e.g. Weekends, Evenings"><br>

      <button type="submit">Save Profile</button>
      <div id="profileMessage"></div>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
