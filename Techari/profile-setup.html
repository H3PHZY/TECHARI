<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Setup - Techari</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h2>Profile Setup</h2>
    <form id="profile-form">
      <label for="bio">Bio:</label>
      <textarea id="bio" placeholder="Tell us about yourself..."></textarea>

      <label for="skills">Skills:</label>
      <input type="text" id="skills" placeholder="Enter your skills (comma separated)">

      <label for="interests">Areas of Interest:</label>
      <input type="text" id="interests" placeholder="Enter your areas of interest (comma separated)">

      <button type="submit">Save Profile</button>
    </form>
    <p id="message"></p>
    <a href="profile-setup.html" class="mentor-btn">Edit Profile</a>
  </div>

  <script src="js/profile.js"></script>
</body>
</html>
